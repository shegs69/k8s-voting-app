replicaCount: 1
imagePullPolicy: Always

redis:
  image: redis
  tag: alpine
  service:
    port: 6379

db:
  image: postgres
  tag: 15-alpine
  service:
    port: 5432
  env:
    postgresUser: postgres
    postgresPassword: postgrespassword

vote:
  image: dockersamples/examplevotingapp_vote
  tag: before
  service:
    type: NodePort
    port: 80
    nodePort: 31000

result:
  image: dockersamples/examplevotingapp_result
  tag: before
  service:
    type: NodePort
    port: 80
    nodePort: 31001

worker:
  image: dockersamples/examplevotingapp_worker
  tag: latest